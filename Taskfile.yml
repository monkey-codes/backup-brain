version: "3"

tasks:
  install:
    desc: Install all dependencies
    cmds:
      - pnpm install

  build:
    desc: Build all packages
    cmds:
      - pnpm -r run typecheck

  dev:
    desc: Start development servers
    deps: [dev:web, dev:agent, dev:functions]

  dev:stop:
    desc: Stop all dev servers
    cmds:
      - pkill -f "supabase functions serve" || true
      - pkill -f "tsx --watch src/index.ts" || true
      - pkill -f "vite.+packages/web" || true

  dev:functions:
    desc: Serve Supabase Edge Functions locally
    cmds:
      - supabase functions serve --no-verify-jwt

  dev:web:
    desc: Start web dev server
    dir: packages/web
    cmds:
      - pnpm run dev

  dev:agent:
    desc: Start agent in watch mode
    dir: packages/agent
    cmds:
      - node --env-file=../../.env --import tsx --watch src/index.ts

  lint:
    desc: Lint all packages
    cmds:
      - pnpm -r run lint

  typecheck:
    desc: Type-check all packages
    cmds:
      - pnpm -r run typecheck

  test:
    desc: Run all tests (agent, web, mcp)
    deps: [test:agent, test:web, test:mcp]

  test:agent:
    desc: Run agent unit and integration tests
    dir: packages/agent
    cmds:
      - pnpm run test

  test:web:
    desc: Run web app component tests
    dir: packages/web
    cmds:
      - pnpm run test

  test:mcp:
    desc: Run MCP server integration tests (requires supabase start + functions serve)
    dir: supabase/functions
    cmds:
      - deno test --no-check --no-lock --allow-net --allow-env --env=../../.env mcp/tools_test.ts

  test:integration:
    desc: Run end-to-end integration tests (full system — stops, resets, starts, tests)
    cmds:
      # 1. Stop everything
      - task dev:stop
      - lsof -ti:5173,3001 | xargs kill -9 2>/dev/null || true
      - supabase stop --no-backup || true

      # 2. Start fresh
      - supabase start --ignore-health-check
      - supabase db reset

      # 3. Generate env & wait for Supabase to be fully ready after db:reset
      - task env
      - |
        echo "Waiting for Supabase API (localhost:54321)..."
        for i in $(seq 1 30); do
          curl -sf http://localhost:54321/rest/v1/ -H "apikey: $(grep '^VITE_SUPABASE_ANON_KEY=' .env | cut -d= -f2-)" > /dev/null 2>&1 && break
          sleep 2
        done
        echo "Supabase API ready."

      # 4. Start dev servers in the background & wait for readiness
      - |
        # Start each dev server as a background process
        cd packages/web && pnpm run dev &
        cd packages/agent && node --env-file=../../.env --import tsx --watch src/index.ts &
        supabase functions serve --no-verify-jwt &

        echo "Waiting for web server (localhost:5173)..."
        for i in $(seq 1 60); do
          curl -sf http://localhost:5173 > /dev/null 2>&1 && break
          sleep 2
        done
        curl -sf http://localhost:5173 > /dev/null 2>&1 || { echo "Web server did not start"; exit 1; }
        echo "Web server ready."

        echo "Waiting for agent health (localhost:3001)..."
        for i in $(seq 1 60); do
          curl -sf http://localhost:3001 > /dev/null 2>&1 && break
          sleep 2
        done
        curl -sf http://localhost:3001 > /dev/null 2>&1 || { echo "Agent health endpoint did not start"; exit 1; }
        echo "Agent ready."

      # 5. Run Playwright tests (passthrough CLI args for --headed etc.)
      - |
        cd {{.ROOT_DIR}}/tests/integration
        set -a && . {{.ROOT_DIR}}/.env && set +a
        npx playwright test {{.CLI_ARGS}}

      # 6. Services left running for debugging

  env:
    desc: Write .env from local Supabase status (preserves OPENAI_API_KEY)
    cmds:
      - |
        OPENAI=""
        if [ -f .env ]; then
          OPENAI=$(grep '^OPENAI_API_KEY=' .env | head -1 | cut -d= -f2-)
        fi
        STATUS=$(supabase status -o yaml 2>/dev/null) || { echo "Supabase is not running. Run 'task db:start' first."; exit 1; }
        URL=$(echo "$STATUS" | grep '^API_URL:' | awk '{print $2}')
        SRK=$(echo "$STATUS" | grep '^SERVICE_ROLE_KEY:' | awk '{print $2}')
        ANON=$(echo "$STATUS" | grep '^ANON_KEY:' | awk '{print $2}')
        cat > .env <<EOF
        SUPABASE_URL=$URL
        SUPABASE_SERVICE_ROLE_KEY=$SRK
        VITE_SUPABASE_URL=$URL
        VITE_SUPABASE_ANON_KEY=$ANON
        OPENAI_API_KEY=${OPENAI:-your-openai-api-key-here}
        EOF
        sed -i '' 's/^[[:space:]]*//' .env
        echo "Wrote .env with keys from local Supabase"

  db:dashboard:
    desc: Open Supabase Studio dashboard in browser
    cmds:
      - open http://localhost:54323/

  db:start:
    desc: Start local Supabase
    cmds:
      - supabase start

  db:stop:
    desc: Stop local Supabase
    cmds:
      - supabase stop

  db:reset:
    desc: Reset local database (applies all migrations from scratch)
    cmds:
      - supabase db reset

  db:migration:
    desc: Create a new migration file
    cmds:
      - supabase migration new {{.CLI_ARGS}}
